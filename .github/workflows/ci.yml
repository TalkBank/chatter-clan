name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, test, run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      # The CHAT core is fetched from the public TalkBank/chatter repo at the tag
      # pinned in Cargo.toml; no auth is needed.
      - name: Build workspace
        run: cargo build --workspace --locked

      # Unit tests (lib + bins) only. The CLAN-parity golden suite
      # (crates/talkbank-clan/tests/clan_golden) byte-matches REAL CLAN output;
      # because this reimplementation is halted and incomplete, it does not yet
      # fully match CLAN, so that integration suite is known-red and is NOT a
      # buildability gate. To work the parity suite, regenerate the goldens with
      # CLAN_BIN_DIR set and run `cargo test -p talkbank-clan --test clan_golden`.
      - name: Test workspace (unit tests)
        run: cargo test --workspace --lib --bins --locked

      # Run the real artifact: prove the standalone CLI actually executes.
      - name: Smoke-run the chatter-clan binary
        run: cargo run --locked -p chatter-clan --bin chatter-clan -- --help
